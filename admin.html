<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HealthCred — Investor Admin</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:#0a0f1a; color:#e8e0d0; min-height:100vh; }

    .header { background:#0D1B2A; border-bottom:1px solid rgba(201,168,76,0.2); padding:20px 32px; display:flex; align-items:center; justify-content:space-between; }
    .header-brand { font-size:18px; font-weight:900; color:#C9A84C; letter-spacing:2px; }
    .header-sub { font-size:11px; color:rgba(255,255,255,0.3); letter-spacing:2px; text-transform:uppercase; margin-top:2px; }

    /* Login gate */
    #login-screen { display:flex; align-items:center; justify-content:center; min-height:calc(100vh - 80px); }
    .login-box { background:#0D1B2A; border:1px solid rgba(201,168,76,0.2); border-radius:16px; padding:48px; width:100%; max-width:400px; text-align:center; }
    .login-box h2 { font-size:22px; color:#C9A84C; margin-bottom:8px; }
    .login-box p { font-size:13px; color:rgba(255,255,255,0.4); margin-bottom:32px; }
    .login-input { width:100%; padding:14px 18px; background:rgba(255,255,255,0.05); border:1px solid rgba(201,168,76,0.25); border-radius:10px; color:#fff; font-size:15px; outline:none; margin-bottom:16px; font-family:inherit; }
    .login-input:focus { border-color:rgba(201,168,76,0.6); }
    .login-btn { width:100%; padding:14px; background:#C9A84C; color:#0D1B2A; border:none; border-radius:10px; font-size:14px; font-weight:900; letter-spacing:1px; cursor:pointer; font-family:inherit; }
    .login-btn:hover { background:#d4b55a; }
    .login-error { color:#e57373; font-size:13px; margin-top:10px; min-height:20px; }

    /* Dashboard */
    #dashboard { display:none; padding:32px; max-width:1400px; margin:0 auto; }
    .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:16px; margin-bottom:32px; }
    .stat-card { background:#0D1B2A; border:1px solid rgba(201,168,76,0.15); border-radius:12px; padding:20px; text-align:center; }
    .stat-val { font-size:32px; font-weight:900; color:#C9A84C; }
    .stat-label { font-size:11px; color:rgba(255,255,255,0.4); letter-spacing:1px; text-transform:uppercase; margin-top:4px; }

    .section-title { font-size:14px; font-weight:700; color:rgba(255,255,255,0.6); letter-spacing:2px; text-transform:uppercase; margin-bottom:16px; }

    /* Investor cards */
    .investor-grid { display:grid; gap:16px; }
    .investor-card { background:#0D1B2A; border:1px solid rgba(201,168,76,0.12); border-radius:14px; padding:24px; }
    .investor-card.nda-signed { border-color:rgba(201,168,76,0.3); }
    .investor-card.interest-submitted { border-color:rgba(76,175,80,0.4); background:rgba(76,175,80,0.03); }

    .inv-header { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:16px; flex-wrap:wrap; }
    .inv-name { font-size:18px; font-weight:800; color:#fff; }
    .inv-email { font-size:13px; color:rgba(255,255,255,0.4); margin-top:2px; }
    .inv-company { font-size:12px; color:#C9A84C; margin-top:2px; }

    .badge { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700; letter-spacing:0.5px; }
    .badge-green { background:rgba(76,175,80,0.15); border:1px solid rgba(76,175,80,0.4); color:#81c784; }
    .badge-gold { background:rgba(201,168,76,0.12); border:1px solid rgba(201,168,76,0.35); color:#C9A84C; }
    .badge-gray { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.4); }
    .badge-blue { background:rgba(100,150,255,0.12); border:1px solid rgba(100,150,255,0.3); color:#90b4ff; }

    .inv-meta { display:flex; flex-wrap:wrap; gap:16px; margin-bottom:16px; font-size:12px; color:rgba(255,255,255,0.4); }
    .inv-meta span strong { color:rgba(255,255,255,0.7); }

    .sections-row { margin-bottom:14px; }
    .sections-label { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-bottom:6px; }
    .section-pills { display:flex; flex-wrap:wrap; gap:5px; }
    .section-pill { font-size:10px; font-weight:700; letter-spacing:0.5px; padding:3px 8px; border-radius:20px; text-transform:uppercase; }
    .section-pill.seen { background:rgba(201,168,76,0.12); border:1px solid rgba(201,168,76,0.3); color:#C9A84C; }
    .section-pill.unseen { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); color:rgba(255,255,255,0.2); }

    .notes-area { margin-top:14px; }
    .notes-input { width:100%; padding:10px 14px; background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:#fff; font-size:13px; font-family:inherit; resize:vertical; min-height:60px; outline:none; }
    .notes-input:focus { border-color:rgba(201,168,76,0.4); }
    .save-notes-btn { margin-top:8px; padding:7px 16px; background:transparent; border:1px solid rgba(201,168,76,0.3); border-radius:8px; color:#C9A84C; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; }
    .save-notes-btn:hover { background:rgba(201,168,76,0.1); }
    .notes-saved { font-size:11px; color:#81c784; margin-left:8px; display:none; }

    .refresh-btn { padding:10px 20px; background:transparent; border:1px solid rgba(201,168,76,0.3); border-radius:8px; color:#C9A84C; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; }
    .refresh-btn:hover { background:rgba(201,168,76,0.1); }

    .empty-state { text-align:center; padding:80px 24px; color:rgba(255,255,255,0.25); font-size:15px; }
    .empty-state div { font-size:48px; margin-bottom:16px; }
  </style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-brand">HEALTHCRED</div>
    <div class="header-sub">Investor Admin — Bridge Round</div>
  </div>
  <button id="refresh-btn" class="refresh-btn" onclick="loadDashboard()" style="display:none;">↻ Refresh</button>
</div>

<!-- Login gate -->
<div id="login-screen">
  <div class="login-box">
    <h2>Admin Access</h2>
    <p>HealthCred investor portal — restricted to Chad R. LaBoy</p>
    <input type="password" id="admin-pw" class="login-input" placeholder="Enter admin password"
      onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">Enter Dashboard →</button>
    <div id="login-error" class="login-error"></div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="stats-row" id="stats-row"></div>
  <div class="section-title">All Investors</div>
  <div class="investor-grid" id="investor-grid"></div>
</div>

<script>
const SECTION_LABELS = {
  'hero':          'Overview',
  'opportunity':   'Opportunity',
  'traction':      'Traction',
  'unit-economics':'Unit Econ',
  'model':         'Rev Model',
  'team':          'Team',
  'capital':       'Capital Stack',
  'invest':        'Invest',
};

let adminPassword = '';

async function login() {
  const pw = document.getElementById('admin-pw').value;
  if (!pw) return;
  adminPassword = pw;
  document.getElementById('login-error').textContent = '';
  await loadDashboard();
}

async function loadDashboard() {
  try {
    const res  = await fetch(`/admin-profiles?password=${encodeURIComponent(adminPassword)}`);
    if (res.status === 401) {
      document.getElementById('login-error').textContent = 'Incorrect password.';
      adminPassword = '';
      return;
    }
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Server error');

    document.getElementById('login-screen').style.display  = 'none';
    document.getElementById('dashboard').style.display     = 'block';
    document.getElementById('refresh-btn').style.display   = 'block';

    renderStats(data.profiles);
    renderInvestors(data.profiles);

  } catch (err) {
    document.getElementById('login-error').textContent = 'Error: ' + err.message;
  }
}

function renderStats(profiles) {
  const total    = profiles.length;
  const signed   = profiles.filter(p => p.ndaSigned).length;
  const interest = profiles.filter(p => p.interestSubmitted).length;
  const active   = profiles.filter(p => {
    if (!p.lastAccessAt) return false;
    return (Date.now() - new Date(p.lastAccessAt).getTime()) < 7 * 24 * 3600 * 1000;
  }).length;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-label">Total Investors</div></div>
    <div class="stat-card"><div class="stat-val">${signed}</div><div class="stat-label">NDA Signed</div></div>
    <div class="stat-card"><div class="stat-val">${interest}</div><div class="stat-label">Interest Submitted</div></div>
    <div class="stat-card"><div class="stat-val">${active}</div><div class="stat-label">Active (7 days)</div></div>
  `;
}

function fmt(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

function renderInvestors(profiles) {
  const grid = document.getElementById('investor-grid');

  if (!profiles.length) {
    grid.innerHTML = '<div class="empty-state"><div>📭</div>No investor profiles yet. They\'ll appear here after investors enter the gate.</div>';
    return;
  }

  grid.innerHTML = profiles.map((p, i) => {
    const cardClass = p.interestSubmitted ? 'investor-card interest-submitted'
                    : p.ndaSigned        ? 'investor-card nda-signed'
                    : 'investor-card';

    const ndaBadge = p.ndaSigned
      ? `<span class="badge badge-green">✓ NDA Signed</span>`
      : `<span class="badge badge-gray">NDA Pending</span>`;

    const interestBadge = p.interestSubmitted
      ? `<span class="badge badge-blue">💰 ${p.interestLevel || 'Interest Submitted'}</span>`
      : p.interestLevel
      ? `<span class="badge badge-gold">Selected: ${p.interestLevel}</span>`
      : '';

    const allSections = Object.keys(SECTION_LABELS);
    const sectionPills = allSections.map(id => {
      const seen = (p.sectionsViewed || []).includes(id);
      return `<span class="section-pill ${seen ? 'seen' : 'unseen'}">${SECTION_LABELS[id]}</span>`;
    }).join('');

    const readPercent = allSections.length
      ? Math.round(((p.sectionsViewed || []).length / allSections.length) * 100)
      : 0;

    return `
      <div class="${cardClass}" id="card-${i}">
        <div class="inv-header">
          <div>
            <div class="inv-name">${escHtml(p.name || 'Unknown')}</div>
            <div class="inv-email">${escHtml(p.email)}</div>
            ${p.company ? `<div class="inv-company">${escHtml(p.company)}</div>` : ''}
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end;">
            ${ndaBadge}
            ${interestBadge}
          </div>
        </div>

        <div class="inv-meta">
          <span>📅 First seen: <strong>${fmt(p.createdAt)}</strong></span>
          <span>🕐 Last access: <strong>${fmt(p.lastAccessAt)}</strong></span>
          <span>👁 Visits: <strong>${p.accessCount || 0}</strong></span>
          <span>📖 Read: <strong>${readPercent}%</strong> (${(p.sectionsViewed||[]).length}/${allSections.length} sections)</span>
          ${p.phone ? `<span>📞 <strong>${escHtml(p.phone)}</strong></span>` : ''}
        </div>

        <div class="sections-row">
          <div class="sections-label">Portal Sections Viewed</div>
          <div class="section-pills">${sectionPills}</div>
        </div>

        <div class="notes-area">
          <div class="sections-label">Notes</div>
          <textarea class="notes-input" id="notes-${i}" placeholder="Add notes about this investor…">${escHtml(p.notes || '')}</textarea>
          <div style="display:flex;align-items:center;">
            <button class="save-notes-btn" onclick="saveNotes('${escHtml(p.email)}', ${i})">Save Notes</button>
            <span class="notes-saved" id="notes-saved-${i}">✓ Saved</span>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

async function saveNotes(email, i) {
  const notes = document.getElementById(`notes-${i}`).value;
  try {
    const res = await fetch('/admin-profiles', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ password: adminPassword, email, notes }),
    });
    if (res.ok) {
      const el = document.getElementById(`notes-saved-${i}`);
      el.style.display = 'inline';
      setTimeout(() => { el.style.display = 'none'; }, 2000);
    }
  } catch (err) {
    console.error('save notes error:', err);
  }
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
