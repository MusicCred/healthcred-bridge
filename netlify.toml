[build]
  command   = ""
  publish   = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from   = "/send-nda"
  to     = "/.netlify/functions/send-nda"
  status = 200

[[redirects]]
  from   = "/check-nda"
  to     = "/.netlify/functions/check-nda"
  status = 200

[[redirects]]
  from   = "/send-lead"
  to     = "/.netlify/functions/send-lead"
  status = 200

[[redirects]]
  from   = "/docusign-webhook"
  to     = "/.netlify/functions/docusign-webhook"
  status = 200

[[redirects]]
  from   = "/investor-profile"
  to     = "/.netlify/functions/investor-profile"
  status = 200

[[redirects]]
  from   = "/magic-link"
  to     = "/.netlify/functions/magic-link"
  status = 200

[[redirects]]
  from   = "/track-progress"
  to     = "/.netlify/functions/track-progress"
  status = 200

[[redirects]]
  from   = "/admin-profiles"
  to     = "/.netlify/functions/admin-profiles"
  status = 200

[[redirects]]
  from   = "/admin"
  to     = "/admin.html"
  status = 200
